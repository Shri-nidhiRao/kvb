<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Admin | KVB Green Energies</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --admin-bg: #f4f6f8;
            --admin-card: #ffffff;
            --admin-text: #333333;
            --admin-primary: #2E7D32;
            --admin-border: #e0e0e0;
        }

        body {
            background-color: var(--admin-bg);
            font-family: 'Open Sans', sans-serif;
            color: var(--admin-text);
            margin: 0;
            padding: 0;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 250px;
            background-color: #1a1a1a;
            color: white;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
        }

        .admin-logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
            text-align: center;
            color: white;
            text-decoration: none;
        }

        .admin-logo span { color: var(--admin-primary); }

        .admin-nav {
            list-style: none;
            padding: 0;
        }

        .admin-nav li a {
            display: flex;
            align-items: center;
            padding: 1rem;
            color: #a0a0a0;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
        }

        .admin-nav li a i {
            margin-right: 15px;
            width: 20px;
            text-align: center;
        }

        .admin-nav li a:hover, .admin-nav li a.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .admin-main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .admin-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            margin: 0;
        }

        .btn-add {
            background-color: var(--admin-primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.3s;
        }

        .btn-add:hover { background-color: #1B5E20; }

        .blog-list {
            background: var(--admin-card);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .blog-list table {
            width: 100%;
            border-collapse: collapse;
        }

        .blog-list th, .blog-list td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--admin-border);
        }

        .blog-list th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #555;
        }

        .blog-list tr:hover { background-color: #fcfcfc; }

        .blog-title-cell {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .blog-title-cell img {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
            background: #eee;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 35px;
            height: 35px;
            border-radius: 6px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-edit { background: #E3F2FD; color: #1976D2; }
        .btn-edit:hover { background: #BBDEFB; }

        .btn-delete { background: #FFEBEE; color: #D32F2F; }
        .btn-delete:hover { background: #FFCDD2; }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            transform: translateY(20px);
            transition: 0.3s;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #444;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--admin-border);
            border-radius: 8px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 200px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 2rem;
        }

        .btn-cancel {
            background: white;
            border: 1px solid var(--admin-border);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-save {
            background: var(--admin-primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <a href="index.html" class="admin-logo">KVB <span>Admin</span></a>
            <ul class="admin-nav">
                <li><a href="#" class="active"><i class="fas fa-file-alt"></i> Manage Blogs</a></li>
                <li><a href="index.html"><i class="fas fa-home"></i> Back to Site</a></li>
                <li><a href="#" onclick="logout(event)" style="color: #ff6b6b;"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-header">
                <h1>Blog Management</h1>
                <button class="btn-add" id="openModalBtn">
                    <i class="fas fa-plus"></i> Add New Blog
                </button>
            </div>

            <div class="blog-list">
                <table>
                    <thead>
                        <tr>
                            <th>Blog Details</th>
                            <th>Author</th>
                            <th>Date Published</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="blogTableBody">
                        <!-- Blogs will be injected here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Blog Form Modal -->
    <div class="modal-overlay" id="blogModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModalBtn">&times;</button>
            <h2 id="modalTitle">Create New Blog</h2>
            <form id="blogForm">
                <input type="hidden" id="blogId">
                <div class="form-group">
                    <label for="blogTitle">Title</label>
                    <input type="text" id="blogTitle" required placeholder="Enter blog title">
                </div>
                <div class="form-group">
                    <label for="blogImage">Cover Image URL</label>
                    <input type="url" id="blogImage" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label for="blogAuthor">Author</label>
                    <input type="text" id="blogAuthor" placeholder="e.g., John Doe">
                </div>
                <div class="form-group">
                    <label for="blogTags">Tags (comma separated)</label>
                    <input type="text" id="blogTags" placeholder="e.g., Solar, Agriculture, Innovation">
                </div>
                <div class="form-group">
                    <label for="blogContent">Content (HTML allowed)</label>
                    <textarea id="blogContent" required placeholder="Write your blog content here..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-save">Save Blog</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
